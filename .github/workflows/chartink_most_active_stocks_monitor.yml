name: Chartink Bot (Market Session)

on:
  workflow_dispatch: {}   # trigger manually from the Actions tab

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      CHARTINK_COOKIE_RAW: ${{ secrets.CHARTINK_COOKIE }}
      CHARTINK_CSRF_TOKEN: ${{ secrets.CHARTINK_CSRF_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      CHARTINK_STATE_FILE: .cache/chartink_state.json
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Chartink monitor
        run: python chartink_monitor.py
