name: NSE Monitor

on:
  workflow_dispatch:

# Restrict default token permissions
permissions:
  contents: read

# Prevent overlapping executions that would cause duplicate Telegram alerts
concurrency:
  group: nse-monitor-execution
  cancel-in-progress: true

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    
    # GitHub maximum job limit is 360 minutes. 
    # Warning: This is 15 minutes shorter than the NSE trading day.
    timeout-minutes: 360 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run NSE monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python NSE_Most_Active_Stocks.py
